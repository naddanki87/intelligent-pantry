server:
  port: 8080
  error:
      whitelabel:
        enabled: false

spring:

  application:
    name: intelligent-pantry

  datasource:
    url: jdbc:h2:mem:pantrydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.2

management:
  endpoints:
    web:
      exposure:
        include: "*"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.ai: DEBUG
